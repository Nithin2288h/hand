services:
  - type: web
    name: reliefsync-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node migrate_profile_system.js && node migrate_emergency_system.js && node server.js
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
